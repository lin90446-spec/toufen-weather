<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>頭份天氣資訊</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="kicker">中央氣象署觀測站 C0E73 / 鄉鎮 1000505</p>
        <h1>頭份天氣資訊</h1>
      </div>
      <button id="refresh" type="button" title="重新整理">↻</button>
    </header>

    <section class="current-grid" aria-label="即時觀測">
      <article class="current-main">
        <p id="obsTime" class="label">讀取中</p>
        <div class="temp-line"><span id="currentTemp">--</span><span>°C</span></div>
        <p id="currentWeather" class="weather">--</p>
      </article>
      <article><span class="label">風向</span><strong id="windDirection">--</strong></article>
      <article><span class="label">風力</span><strong id="windSpeed">--</strong><small>m/s</small></article>
      <article><span class="label">陣風</span><strong id="gust">--</strong><small>m/s</small></article>
      <article><span class="label">相對溼度</span><strong id="humidity">--</strong><small>%</small></article>
      <article><span class="label">累積雨量</span><strong id="rain">--</strong><small>mm</small></article>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>過去 24 小時變化</h2>
        <p id="timeRange">--</p>
      </div>
      <div class="charts">
        <div>
          <h3>溫度</h3>
          <svg id="tempChart" viewBox="0 0 680 220" role="img" aria-label="過去24小時溫度變化"></svg>
        </div>
        <div>
          <h3>相對溼度</h3>
          <svg id="humidityChart" viewBox="0 0 680 220" role="img" aria-label="過去24小時相對溼度變化"></svg>
        </div>
        <div>
          <h3>雨量</h3>
          <svg id="rainChart" viewBox="0 0 680 220" role="img" aria-label="過去24小時雨量變化"></svg>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>未來 72 小時預報</h2>
        <p>氣象署此頁提供降雨機率，非逐時雨量毫米。</p>
      </div>
      <div class="forecast-wrap">
        <table>
          <thead>
            <tr>
              <th>時間</th>
              <th>天氣</th>
              <th>溫度</th>
              <th>相對溼度</th>
              <th>降雨機率</th>
              <th>風向</th>
              <th>風力</th>
            </tr>
          </thead>
          <tbody id="forecastBody"></tbody>
        </table>
      </div>
    </section>

    <footer>
      <span id="lastUpdated">--</span>
      <a href="https://www.cwa.gov.tw/V8/C/W/OBS_Station.html?ID=C0E73" target="_blank" rel="noreferrer">觀測資料來源</a>
      <a href="https://www.cwa.gov.tw/V8/C/W/Town/Town.html?TID=1000505" target="_blank" rel="noreferrer">預報資料來源</a>
    </footer>
  </main>
  <script src="/app.js"></script>
</body>
</html>
